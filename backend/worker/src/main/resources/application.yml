spring:
  application:
    name: closethop-worker

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET:closethop-images}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY:dummy}
    secret-key: ${AWS_SECRET_KEY:dummy}
    endpoint: ${AWS_ENDPOINT:http://localhost:4566}

worker:
  enabled: ${WORKER_ENABLED:true}
  processing-queue-url: ${PROCESSING_QUEUE_URL:}
  result-queue-url: ${PROCESSING_RESULT_QUEUE_URL:}
  region: ${AWS_REGION:us-east-1}
  endpoint: ${AWS_ENDPOINT:http://localhost:4566}
  access-key: ${AWS_ACCESS_KEY:dummy}
  secret-key: ${AWS_SECRET_KEY:dummy}
  public-url: ${AWS_PUBLIC_URL:http://localhost:4566/closethop-images}
  max-messages-per-poll: ${WORKER_MAX_MESSAGES_PER_POLL:1}
  wait-time-seconds: ${WORKER_WAIT_TIME_SECONDS:20}
  image-processor-base-url: ${IMAGE_PROCESSOR_BASE_URL:http://localhost:8080}
  image-processor-timeout-ms: ${IMAGE_PROCESSOR_TIMEOUT_MS:180000}
  max-receive-count-before-failure: ${WORKER_MAX_RECEIVE_COUNT_BEFORE_FAILURE:3}

logging:
  level:
    com.wardrobe: ${LOG_LEVEL:INFO}
    org.springframework: INFO
