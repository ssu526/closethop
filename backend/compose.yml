services:
  localstack:
    # Last community release that does not require a LocalStack account token.
    image: localstack/localstack:4.14.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      AWS_DEFAULT_REGION: us-east-1
      SQS_ENDPOINT_STRATEGY: path
      PERSISTENCE: "1"
      DEBUG: ${LOCALSTACK_DEBUG:-0}
    volumes:
      - ./localstack/init:/etc/localstack/init/ready.d
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  image-processor:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    environment:
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      IMAGE_BUCKET: closethop-images
      PUBLIC_URL: http://localhost:4566/closethop-images
      VISION_PROVIDER: fake
      METRICS_ENABLED: "false"
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: backend/worker/Dockerfile
    environment:
      AWS_ACCESS_KEY: dummy
      AWS_SECRET_KEY: dummy
      AWS_REGION: us-east-1
      AWS_ENDPOINT: http://localstack:4566
      AWS_S3_BUCKET: closethop-images
      PROCESSING_QUEUE_URL: http://localstack:4566/queue/us-east-1/000000000000/closethop-image-processing
      PROCESSING_RESULT_QUEUE_URL: http://localstack:4566/queue/us-east-1/000000000000/closethop-image-processing-results
      AWS_PUBLIC_URL: http://localhost:4566/closethop-images
      IMAGE_PROCESSOR_BASE_URL: http://image-processor:8080
    depends_on:
      localstack:
        condition: service_healthy
      image-processor:
        condition: service_healthy
    restart: unless-stopped

volumes:
  localstack-data:
