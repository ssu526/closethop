services:
  localstack:
    # Last community release that does not require a LocalStack account token.
    image: localstack/localstack:4.14.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      AWS_DEFAULT_REGION: us-east-1
      PERSISTENCE: "1"
      DEBUG: ${LOCALSTACK_DEBUG:-0}
    volumes:
      - ./localstack/init:/etc/localstack/init/ready.d
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: closethop
      POSTGRES_USER: closethop
      POSTGRES_PASSWORD: closethop
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U closethop -d closethop"]
      interval: 5s
      timeout: 3s
      retries: 20

  python-worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    environment:
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/closethop
      DATASOURCE_USERNAME: closethop
      DATASOURCE_PASSWORD: closethop
      IMAGE_BUCKET: closethop-images
      PROCESSING_QUEUE_URL: http://localstack:4566/000000000000/closethop-image-processing
      PUBLIC_URL: http://localhost:4566/closethop-images
      VISION_PROVIDER: gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_RETRY_ATTEMPTS: "2"
      PROCESSING_DEADLINE_SECONDS: "120"
      SQS_VISIBILITY_TIMEOUT_SECONDS: "300"
      WORKER_CONCURRENCY: "1"
      SQS_MAX_MESSAGES: "1"
      METRICS_ENABLED: "false"
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  localstack-data:
