spring:
  profiles:
    active: local

  datasource:
    url: jdbc:h2:mem:closethop-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: false

aws:
  s3:
    bucket-name: test-closethop-images
    region: us-east-1
    access-key: dummy
    secret-key: dummy
    endpoint:

processing:
  enabled: false

ai:
  outfit:
    provider: fake
    model: gemini-2.5-flash-lite
    api-key:
    prompt-path: classpath:prompts/outfit_suggestion_prompt.txt
    max-candidates: 100
    max-prompt-bytes: 65536
    max-suggestions: 3
    bulkhead:
      max-concurrent-requests: 4
      acquire-timeout-ms: 250
    retry:
      max-attempts: 2
      backoff-min-ms: 200
      backoff-jitter-ms: 200
    circuit-breaker:
      failure-threshold: 5
      open-duration-ms: 30000
