spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/closethop}
    username: ${DATASOURCE_USERNAME:closethop}
    password: ${DATASOURCE_PASSWORD:closethop}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

aws:
  s3:
    bucket-name: closethop-images
    region: us-east-1
    access-key: dummy
    secret-key: dummy
    endpoint: http://localhost:4566
