services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-closethop}
      POSTGRES_USER: ${POSTGRES_USER:-closethop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /data/closethop/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-closethop} -d ${POSTGRES_DB:-closethop}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  api:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8080"
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-closethop}
      DATASOURCE_USERNAME: ${POSTGRES_USER:-closethop}
      DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      COGNITO_ISSUER: ${COGNITO_ISSUER}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OUTFIT_AI_MODEL: ${OUTFIT_AI_MODEL:-gemini-2.5-flash-lite}
      OUTFIT_SUGGESTION_PROMPT_PATH: classpath:prompts/outfit_suggestion_prompt.txt
      IMAGE_SIGNED_URL_MINUTES: ${IMAGE_SIGNED_URL_MINUTES:-15}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - internal

  python-worker:
    build:
      context: ../..
      dockerfile: worker/Dockerfile
    environment:
      AWS_REGION: ${AWS_REGION}
      AWS_DEFAULT_REGION: ${AWS_REGION}
      IMAGE_BUCKET: ${AWS_S3_BUCKET}
      PROCESSING_QUEUE_URL: ${PROCESSING_QUEUE_URL}
      PUBLIC_URL: ${AWS_PUBLIC_URL:-}
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-closethop}
      DATASOURCE_USERNAME: ${POSTGRES_USER:-closethop}
      DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      VISION_MODEL: ${OUTFIT_AI_MODEL:-gemini-2.5-flash-lite}
      METRICS_ENABLED: "false"
      SQS_MAX_MESSAGES: ${SQS_MAX_MESSAGES:-1}
      SQS_WAIT_TIME_SECONDS: ${SQS_WAIT_TIME_SECONDS:-20}
      SQS_VISIBILITY_TIMEOUT_SECONDS: ${SQS_VISIBILITY_TIMEOUT_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs
    command: >
      /bin/sh -c "if [ ! -f /etc/nginx/certs/fullchain.pem ]; then
        openssl req -x509 -nodes -newkey rsa:2048 -days 7 -keyout /etc/nginx/certs/privkey.pem -out /etc/nginx/certs/fullchain.pem -subj '/CN=closethop-local-bootstrap';
      fi;
      nginx -g 'daemon off;'"
    depends_on:
      api:
        condition: service_healthy
      python-worker:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal

  backup:
    build:
      context: ./backup
    profiles: ["backup"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-closethop}
      POSTGRES_USER: ${POSTGRES_USER:-closethop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      AWS_REGION: ${AWS_REGION}
      BACKUP_BUCKET: ${BACKUP_BUCKET}
      BACKUP_PREFIX: ${BACKUP_PREFIX:-postgres}
    volumes:
      - /data/closethop/backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
